name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - run: uv run pytest
      - run: uv run rtscortex doctor

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.9"
      - run: uv venv --python 3.9 .worker-venv
      - run: >-
          uv pip install --python .worker-venv/bin/python
          -e integrations/llm_pysc2
          -e third_party/LLM-PySC2
      - name: Validate reviewed patch chain on Python 3.9
        shell: bash
        run: |
          set -euo pipefail
          patches=(
            ../../integrations/llm_pysc2/patches/0001-return-noop-while-awaiting-runtime.patch
            ../../integrations/llm_pysc2/patches/0002-pass-random-seed-to-sc2env.patch
            ../../integrations/llm_pysc2/patches/0003-fix-build-feature-plane-coordinate-order.patch
            ../../integrations/llm_pysc2/patches/0004-expose-structured-translation-results.patch
            ../../integrations/llm_pysc2/patches/0005-fix-near-base-placement.patch
            ../../integrations/llm_pysc2/patches/0006-report-pretranslation-action-aborts.patch
            ../../integrations/llm_pysc2/patches/0007-preserve-transient-team-units.patch
            ../../integrations/llm_pysc2/patches/0008-enforce-nexus-resource-clearance.patch
            ../../integrations/llm_pysc2/patches/0009-use-exact-nexus-screen-scale.patch
          )
          applied=()
          cleanup() {
            for ((index=${#applied[@]} - 1; index >= 0; index--)); do
              git -C third_party/LLM-PySC2 apply --reverse "${applied[index]}"
            done
          }
          trap cleanup EXIT

          for patch in "${patches[@]}"; do
            git -C third_party/LLM-PySC2 apply --check "$patch"
            git -C third_party/LLM-PySC2 apply "$patch"
            applied+=("$patch")
          done

          .worker-venv/bin/python -m compileall -q \
            integrations/llm_pysc2/src \
            third_party/LLM-PySC2/llm_pysc2
          PYGAME_HIDE_SUPPORT_PROMPT=1 .worker-venv/bin/python -c \
            "import llm_pysc2.agents, pysc2, rtscortex_llm_pysc2.worker"
          PYGAME_HIDE_SUPPORT_PROMPT=1 .worker-venv/bin/python \
            integrations/llm_pysc2/tests/python39_contract_smoke.py

          cleanup
          applied=()
          trap - EXIT
          git -C third_party/LLM-PySC2 diff --exit-code
          test -z "$(git -C third_party/LLM-PySC2 status --short)"
