run:
  output_root: ~/scratch/outputs/RTSCortex
  runtime_root: ~/fastscratch/rtscortex_runtime
  seed: 0
environment:
  adapter: llm_pysc2
  scenario: Simple64
  max_steps: 2500
  agent_race: zerg
  opponent_race: terran
  opponent_difficulty: very_easy
  opponent_build: macro
  step_mul: 1
  game_steps_per_episode: 2500
  simulation_speed_multiplier: 0.5
  pause_until_first_plan: true
  sc2_path: ~/scratch/StarCraftII
  action_effect_timeout_game_loops: 112
  observation_gap_watchdog_game_loops: 112
  observation_gap_hard_limit_game_loops: 448
  worker_python: ~/fastscratch/envs/rtscortex-llm-pysc2/bin/python
runtime:
  deterministic: false
  planning_interval_game_loops: 112
  planner_command_ttl_game_loops: 112
  planner_timeout_seconds: 90.0
  max_actions: 5
agent:
  variant: cortex
cortex:
  situation:
    kind: deterministic
  arbiter:
    mode: shadow
    switch_margin: 1.0
    max_intents: 7
  macro:
    kind: hima_ensemble
    python_executable: ~/fastscratch/envs/rtscortex-hima/bin/python
    ensemble_members:
      - candidate: zerg-a
        model_path: ~/fastscratch/cache/huggingface/hub/models--SNUMPR--Zerg-a/snapshots/c2bb6b08f531cd96d46c83e004c1312066855a46
        device: cuda:0
      - candidate: zerg-b
        model_path: ~/fastscratch/cache/huggingface/hub/models--SNUMPR--Zerg-b/snapshots/8b74c24921ee921445b27b1e7ce13523cbde9c0a
        device: cuda:1
      - candidate: zerg-c
        model_path: ~/fastscratch/cache/huggingface/hub/models--SNUMPR--Zerg-c/snapshots/79322205ba70ccd56a72645164178aa027d2fbf6
        device: cuda:1
    coordinator: deterministic_v1
    ensemble_schedule: staggered
    allow_unlicensed_weights: true
    required: true
    interval_game_loops: 112
    plan_ttl_game_loops: 448
    timeout_seconds: 90.0
    max_new_tokens: 512
    restart_limit: 1
  tactical:
    kind: deterministic
  executor:
    kind: deterministic
    timeout_ms: 10.0
    fallback: deterministic
    supply_emergency_free_supply: 2
    resource_fallback_pylon_free_supply: 4
  playbook:
    enabled: true
    database_path: ~/scratch/outputs/RTSCortex/cortex-playbook.sqlite3
    top_k: 6
    min_confidence: 0.6
    promotion_support: 2
    include_candidates: false
    rule_mode: shadow
    max_hard_rules: 8
    max_soft_rules: 8
reflex:
  enabled: true
  low_health_threshold: 0.25
  target_latency_ms: 50.0
provider:
  kind: fake
  model: fake-planner-v1
evaluation:
  seeds: [0]
console:
  enabled: false
  port: 8765
  frame_fps: 2.0
  rgb_screen_size: 256
  rgb_minimap_size: 128
  jpeg_quality: 75
  stale_after_seconds: 2.0
  frontend_event_limit: 5000
